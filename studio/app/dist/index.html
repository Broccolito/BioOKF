<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BioOKF Studio</title>
<link rel="stylesheet" href="vendor/xterm.css" />
<style>
  :root{
    /* Codex / ChatGPT-inspired flat, neutral system. Dominant near-whites,
       restrained ink, one teal accent, hairline structure over heavy shadow. */
    --bg:#ffffff;
    --bg-sidebar:#f9f9f9;
    --bg-stage:#fbfbfa;
    --bg-elev:#ffffff;
    --bg-sunken:#f4f4f3;
    --hover:rgba(13,13,13,0.045);
    --active:rgba(13,13,13,0.075);
    --text:#0d0d0d;
    --muted:#5b5d66;
    --faint:#8e8ea0;
    --hair:rgba(13,13,13,0.10);
    --hair-2:rgba(13,13,13,0.06);
    --accent:#10a37f;            /* primary action / active */
    --accent-ink:#0c7a5e;
    --accent-soft:rgba(16,163,127,0.12);
    --link:#4f5a8a;              /* citation blue-grey (the hyperlink colour) */
    --link-hover:#374270;
    --danger:#c4564b;
    --warn:#b07d3a;
    --shadow-sm:0 1px 2px rgba(13,13,13,0.06);
    --shadow-md:0 8px 28px rgba(13,13,13,0.10);
    --shadow-lg:0 20px 56px rgba(13,13,13,0.18);
    --r-xs:5px; --r-sm:7px; --r-md:10px; --r-lg:14px;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    --tb-h:48px;
    --lights-w:112px;           /* reserved corner for the macOS traffic lights */
    --sb-w:248px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:var(--sans);color:var(--text);overflow:hidden;height:100%;background:var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:14px;line-height:1.5;letter-spacing:-0.006em;}
  /* The desktop window is transparent + vibrant; an opaque app surface gives the
     flat Codex/ChatGPT look. A browser has no desktop behind it, so the same
     solid base is used as a fallback. */
  html.tauri body{background:transparent;}
  html.tauri .window{background:var(--bg);}
  .window{position:absolute;inset:0;z-index:1;overflow:hidden;display:flex;flex-direction:column;}

  /* ---------- top bar ---------- */
  .titlebar{height:var(--tb-h);flex:0 0 var(--tb-h);display:flex;align-items:center;gap:12px;
    padding:0 14px;background:var(--bg);border-bottom:1px solid var(--hair);position:relative;z-index:6;}
  /* leave a dedicated little corner for the real traffic lights, with a hairline
     divider, and let the graph title start to the right of it */
  html.tauri .titlebar{padding-left:var(--lights-w);}
  html.tauri .titlebar::before{content:"";position:absolute;left:calc(var(--lights-w) - 13px);
    top:11px;bottom:11px;width:1px;background:var(--hair);}
  .tb-title{font-size:14px;font-weight:600;letter-spacing:-0.012em;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:32vw;}
  .tb-sub{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .tb-spacer{flex:1;}
  .tb-search{display:flex;align-items:center;gap:7px;background:var(--bg-sunken);border:1px solid transparent;
    border-radius:var(--r-md);padding:6px 10px;color:var(--faint);width:264px;transition:border-color .15s,background .15s,box-shadow .15s;}
  .tb-search:focus-within{background:var(--bg-elev);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .tb-search input{border:none;background:transparent;outline:none;flex:1;min-width:0;font-family:var(--sans);font-size:13px;color:var(--text);letter-spacing:-0.006em;}
  .tb-search input::placeholder{color:var(--faint);}
  .tb-kbd{font-family:var(--mono);font-size:10.5px;color:var(--faint);border:1px solid var(--hair);border-radius:5px;padding:1px 5px;}
  .lint-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);
    background:var(--bg-sunken);border:1px solid var(--hair-2);border-radius:999px;padding:3px 10px;white-space:nowrap;
    cursor:pointer;transition:background .12s,border-color .12s;}
  .lint-pill:hover{background:var(--hover);border-color:var(--hair);}
  .lint-pill .e{color:var(--danger);font-weight:650;} .lint-pill .w{color:var(--warn);font-weight:650;}
  .lint-pop{position:fixed;z-index:60;display:none;width:380px;max-width:calc(100vw - 32px);max-height:50vh;overflow-y:auto;
    background:var(--bg-elev);border:1px solid var(--hair);border-radius:var(--r-lg);box-shadow:var(--shadow-md);padding:8px 4px;}
  .lint-pop.open{display:block;}
  .lint-pop .lp-group{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);padding:8px 12px 4px;}
  .lint-pop .lp-row{display:flex;gap:8px;align-items:flex-start;padding:5px 12px;border-radius:var(--r-sm);}
  .lint-pop .lp-row:hover{background:var(--hover);}
  .lint-pop .lp-dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;margin-top:5px;}
  .lint-pop .lp-dot.error{background:var(--danger);} .lint-pop .lp-dot.warn{background:var(--warn);} .lint-pop .lp-dot.info{background:var(--accent);}
  .lint-pop .lp-text{min-width:0;font-size:12px;line-height:1.4;color:var(--text);}
  .lint-pop .lp-rule{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-right:6px;}
  .lint-pop .lp-subj{font-weight:600;}
  .lint-pop .lp-path{display:block;font-size:10.5px;color:var(--faint);margin-top:1px;}
  .lint-pop .lp-empty{font-size:12px;color:var(--faint);padding:10px 12px;}
  .tb-btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px;border:1px solid var(--hair);
    border-radius:var(--r-md);background:var(--bg-elev);color:var(--muted);font-size:12.5px;font-weight:500;cursor:pointer;font-family:var(--sans);}
  .tb-btn:hover{background:var(--hover);color:var(--text);} .tb-btn svg{flex:0 0 auto;}

  /* ---------- body / sidebar ---------- */
  .wbody{flex:1;display:flex;min-height:0;}
  .sidebar{width:var(--sb-w);flex:0 0 var(--sb-w);display:flex;flex-direction:column;overflow:hidden;
    background:var(--bg-sidebar);border-right:1px solid var(--hair);
    transition:width .24s cubic-bezier(.4,0,.2,1),flex-basis .24s cubic-bezier(.4,0,.2,1);}
  .wbody.collapsed .sidebar{width:60px;flex-basis:60px;}
  .sb-top{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
  .sb-name{font-size:13.5px;font-weight:650;letter-spacing:-0.01em;white-space:nowrap;}
  .collapse{margin-left:auto;width:26px;height:26px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--faint);
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex:0 0 26px;transition:background .12s,color .12s;}
  .collapse:hover{background:var(--hover);color:var(--text);}
  .wbody.collapsed .sb-name,.wbody.collapsed .sb-label,.wbody.collapsed .kb-meta,.wbody.collapsed .kb-name,
  .wbody.collapsed .kb-when,.wbody.collapsed .sb-foot{opacity:0;pointer-events:none;}
  .wbody.collapsed .sb-top{justify-content:center;padding:14px 0 10px;}
  .wbody.collapsed .collapse{margin:0;}
  .wbody.collapsed .sb-name{display:none;}
  .sb-label{font-size:11px;font-weight:550;letter-spacing:.02em;text-transform:uppercase;color:var(--faint);padding:12px 16px 6px;white-space:nowrap;}
  .kb-list{flex:1;overflow-y:auto;padding:0 8px;}
  .kb{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;margin:1px 0;
    border:1px solid transparent;transition:background .12s,border-color .12s;}
  .kb:hover{background:var(--hover);} .kb.active{background:var(--bg-elev);border-color:var(--hair);box-shadow:var(--shadow-sm);}
  .kb-mono{display:none;width:32px;height:26px;border-radius:var(--r-sm);background:var(--bg-sunken);font-size:11.5px;font-weight:650;
    color:var(--muted);align-items:center;justify-content:center;flex:0 0 32px;}
  .wbody.collapsed .kb-mono{display:flex;} .wbody.collapsed .kb-text{display:none;}
  .wbody.collapsed .kb{justify-content:center;padding:7px 0;} .kb.active .kb-mono{background:var(--accent-soft);color:var(--accent-ink);}
  .kb-text{min-width:0;flex:1;}
  .kb-name{display:block;font-size:13px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;}
  .kb-meta{display:block;font-size:11.5px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;}
  .kb-when{display:block;font-size:10.5px;color:var(--faint);opacity:.85;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-foot{padding:8px 12px 12px;}
  .new-kb{width:100%;text-align:left;padding:8px 10px;border-radius:var(--r-md);border:1px dashed var(--hair);background:transparent;
    color:var(--muted);font-size:12.5px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:background .12s,color .12s,border-color .12s;}
  .new-kb:hover{background:var(--hover);color:var(--text);border-color:transparent;}

  /* ---------- stage / canvas ---------- */
  .main{flex:1;position:relative;min-width:0;}
  .stage{position:absolute;inset:0;background:var(--bg-stage);overflow:hidden;}
  canvas{display:block;width:100%;height:100%;cursor:grab;} canvas.grabbing{cursor:grabbing;}

  /* ---------- legend ---------- */
  .legend{position:absolute;left:16px;bottom:16px;z-index:6;max-width:300px;background:var(--bg-elev);
    border:1px solid var(--hair);border-radius:var(--r-lg);box-shadow:var(--shadow-md);padding:12px 14px;}
  .legend h4{margin:0 0 9px;font-size:11px;letter-spacing:.02em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .legend h4 .tg{float:right;cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0;color:var(--accent-ink);}
  .legend-fam{margin-bottom:7px;} .fam-name{color:var(--faint);font-size:10.5px;margin-bottom:4px;font-weight:500;}
  .swatches{display:flex;flex-wrap:wrap;gap:3px;} .sw{display:flex;align-items:center;gap:5px;padding:1px 7px 1px 3px;border-radius:var(--r-sm);}
  .sw i{width:10px;height:10px;border-radius:3px;display:inline-block;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.18);}
  .sw span{font-size:10.5px;color:var(--text);white-space:nowrap;}
  .legend.min .legend-body{display:none;}
  /* collapsed legend: drop the toggle beneath the heading and shrink to fit (expanded layout unchanged) */
  .legend.min{max-width:max-content;}
  .legend.min h4{margin:0;}
  .legend.min h4 .tg{float:none;display:block;margin-top:6px;}

  /* ---------- detail panel (node / edge) ---------- */
  .detail{position:absolute;top:16px;right:16px;width:460px;max-height:calc(100% - 32px);z-index:8;background:var(--bg-elev);
    border:1px solid var(--hair);border-radius:var(--r-lg);box-shadow:var(--shadow-md);display:none;flex-direction:column;overflow:hidden;
    animation:pop .18s cubic-bezier(.2,.8,.2,1);}
  .detail.open{display:flex;} @keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.99);}to{opacity:1;transform:none;}}
  .d-head{padding:16px 16px 13px;border-bottom:1px solid var(--hair);position:relative;}
  .d-badge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:650;letter-spacing:.02em;color:#fff;padding:3px 9px;border-radius:var(--r-xs);}
  .d-sub{font-size:11.5px;color:var(--muted);margin-left:8px;}
  .d-id{font-size:18px;font-weight:680;letter-spacing:-0.02em;margin:11px 0 3px;line-height:1.22;}
  .d-desc{font-size:12.5px;color:var(--muted);line-height:1.5;}
  .d-close{position:absolute;top:13px;right:13px;width:26px;height:26px;border-radius:var(--r-sm);border:none;background:transparent;
    color:var(--faint);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;}
  .d-close:hover{background:var(--hover);color:var(--text);}
  /* reveal-in-Finder button, sits just left of the close button (node panels) */
  .d-reveal{position:absolute;top:13px;right:45px;width:26px;height:26px;border-radius:var(--r-sm);border:none;background:transparent;
    color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;}
  .d-reveal:hover{background:var(--hover);color:var(--text);}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
  .chip{font-size:11px;color:var(--muted);background:var(--bg-sunken);border-radius:var(--r-xs);padding:3px 8px;}
  .chip.xref{font-family:var(--mono);color:var(--muted);cursor:pointer;transition:background .12s,color .12s;}
  .chip.xref:hover{background:var(--active);color:var(--text);}
  .d-body{overflow-y:auto;padding:14px 16px 18px;}
  .d-section{margin-top:2px;}
  .d-section h5{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin:15px 0 8px;font-weight:600;
    display:flex;align-items:center;gap:8px;}
  .d-section h5 .h5-act{margin-left:auto;text-transform:none;letter-spacing:0;}
  .edge-group{margin-bottom:10px;}
  .eg-pred{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg-sunken);border-radius:var(--r-xs);padding:2px 7px;display:inline-block;margin-bottom:5px;}
  .erow{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s;}
  .erow:hover{background:var(--hover);}
  .erow .arrow{color:var(--faint);font-size:11px;}
  .erow .tgt{display:flex;align-items:center;gap:7px;min-width:0;}
  .erow .tgt i{width:10px;height:10px;border-radius:3px;flex:0 0 10px;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.18);}
  .erow .tgt span{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .erow .stat{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap;}
  .ext{font-size:9.5px;color:var(--faint);border:1px solid var(--hair);border-radius:4px;padding:0 4px;margin-left:5px;}

  /* document + markdown */
  .md{font-size:13px;line-height:1.62;color:#23262d;}
  .md h1{font-size:15.5px;font-weight:660;letter-spacing:-0.01em;margin:4px 0 8px;}
  .md h2{font-size:13.5px;font-weight:620;margin:14px 0 6px;}
  .md p{margin:7px 0;} .md ul{margin:7px 0;padding-left:18px;} .md li{margin:2px 0;}
  .md code{font-family:var(--mono);font-size:11.5px;background:var(--bg-sunken);padding:1.5px 5px;border-radius:5px;}
  /* figures embedded in markdown (raw source papers, node bodies) */
  .md-img{display:block;max-width:100%;height:auto;margin:10px 0;border:1px solid var(--hair);border-radius:var(--r-md);background:var(--bg-sunken);}
  /* citation hyperlinks (blue-grey) — node-body cross-refs + edge primary_source */
  .md a,.cite{color:var(--link);text-decoration:none;border-bottom:1px solid rgba(79,90,138,0.32);cursor:pointer;transition:color .12s,border-color .12s,background .12s;}
  .md a:hover,.cite:hover{color:var(--link-hover);border-bottom-color:var(--link-hover);}
  .cite{font-weight:500;}
  .fm{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--bg-sunken);border:1px solid var(--hair-2);
    border-radius:var(--r-md);padding:10px 12px;white-space:pre-wrap;line-height:1.55;overflow-x:auto;}
  .prov{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .prov .cell{background:var(--bg-sunken);border-radius:var(--r-md);padding:8px 10px;}
  .prov .k{font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);}
  .prov .v{font-size:12px;color:var(--text);margin-top:3px;font-weight:550;word-break:break-word;}
  .prov .v.cite{font-weight:550;display:inline;border-bottom:1px solid rgba(79,90,138,0.32);}
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
  .statgrid .cell{background:var(--bg-sunken);border-radius:var(--r-md);padding:8px;text-align:center;}
  .statgrid .v{font-family:var(--mono);font-size:12.5px;font-weight:650;} .statgrid .k{font-size:9px;color:var(--faint);margin-top:3px;}
  .edge-headline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13.5px;margin-top:9px;}
  .edge-headline .n{display:inline-flex;align-items:center;gap:6px;font-weight:600;cursor:pointer;}
  .edge-headline .n i{width:11px;height:11px;border-radius:3px;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.18);}
  .edge-headline .p{font-family:var(--mono);font-size:11px;color:#fff;background:#6b7280;border-radius:var(--r-xs);padding:2px 7px;}
  /* negative (`not_<X>`) predicates — refuted relations read reddish + struck */
  .edge-headline .p.neg{background:var(--danger);}
  .eg-pred.neg{color:var(--danger);background:rgba(196,86,75,0.10);text-decoration:line-through;text-decoration-thickness:1px;}
  .erow .stat.neg{color:var(--danger);}
  /* metadata key/value grid (node frontmatter fields) */
  .metagrid{display:flex;flex-direction:column;gap:4px;}
  .meta-row{display:grid;grid-template-columns:104px 1fr;gap:8px;background:var(--bg-sunken);border-radius:var(--r-sm);padding:6px 9px;}
  .meta-k{font-size:10px;letter-spacing:.02em;text-transform:uppercase;color:var(--faint);font-weight:600;padding-top:1px;}
  .meta-v{font-size:12px;color:var(--text);word-break:break-word;line-height:1.45;}
  .meta-v code{font-family:var(--mono);font-size:10.5px;background:var(--bg);border:1px solid var(--hair-2);padding:1px 5px;border-radius:4px;}
  .chips.inline{margin-top:0;}
  /* publications / qualifiers */
  .pub-list{display:flex;flex-direction:column;gap:5px;font-size:12px;word-break:break-all;}
  /* source / provenance */
  .src-badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:2px;}
  .src-origin{font-size:10.5px;font-weight:650;letter-spacing:.02em;color:#fff;background:#6b7280;border-radius:var(--r-xs);padding:3px 9px;}
  .src-tier{font-size:10.5px;font-weight:650;letter-spacing:.02em;border-radius:var(--r-xs);padding:3px 9px;}
  .src-tier.tier-hi{color:#fff;background:var(--accent);} .src-tier.tier-mid{color:var(--accent-ink);background:var(--accent-soft);} .src-tier.tier-lo{color:var(--muted);background:var(--bg-sunken);}
  .src-conf{font-size:10.5px;color:var(--muted);background:var(--bg-sunken);border-radius:var(--r-xs);padding:3px 9px;font-variant-numeric:tabular-nums;}
  .src-retracted{font-size:10.5px;font-weight:700;color:#fff;background:var(--danger);border-radius:var(--r-xs);padding:3px 9px;}
  .src-figs{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .src-fig{margin:0;max-width:170px;} .src-fig img{max-width:100%;}
  .src-fig figcaption{font-size:10px;color:var(--faint);margin-top:4px;word-break:break-word;}
  .fig-flag{font-size:9px;color:var(--muted);border:1px solid var(--hair);border-radius:4px;padding:0 4px;margin-left:3px;}
  .fig-flag.prov{color:var(--warn);border-color:var(--warn);} .fig-flag.undesc{color:var(--danger);border-color:var(--danger);}
  /* legend: external state swatch (dashed outline, mirrors the canvas) */
  .sw i.sw-ext{box-shadow:none;border:1px dashed rgba(18,21,26,0.55);}

  /* ---------- inline node-body editor ---------- */
  .edit-toggle{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:550;color:var(--accent-ink);
    background:var(--accent-soft);border:none;border-radius:var(--r-xs);padding:3px 9px;cursor:pointer;font-family:var(--sans);}
  .edit-toggle:hover{background:rgba(16,163,127,0.18);}
  .edit-toggle[disabled]{color:var(--faint);background:var(--bg-sunken);cursor:not-allowed;}
  .md-edit{width:100%;min-height:200px;resize:vertical;font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--text);
    background:var(--bg-elev);border:1px solid var(--hair);border-radius:var(--r-md);padding:11px 12px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .md-edit:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .edit-bar{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .btn{height:30px;padding:0 13px;border-radius:var(--r-md);font-size:12.5px;font-weight:550;cursor:pointer;font-family:var(--sans);border:1px solid var(--hair);background:var(--bg-elev);color:var(--muted);transition:background .12s,color .12s,border-color .12s,opacity .12s;}
  .btn:hover{background:var(--hover);color:var(--text);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:var(--accent-ink);}
  .btn[disabled]{opacity:.55;cursor:not-allowed;}
  .edit-status{font-size:11.5px;color:var(--faint);margin-left:2px;}
  .edit-status.ok{color:var(--accent-ink);} .edit-status.err{color:var(--danger);}
  /* section header action buttons (frontmatter editor, notes) */
  .sec-actions{margin-left:auto;display:inline-flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;}
  .btn-mini{height:24px;padding:0 10px;border-radius:var(--r-sm);font-size:11.5px;font-weight:550;cursor:pointer;font-family:var(--sans);
    border:1px solid var(--hair);background:var(--bg-elev);color:var(--muted);transition:background .12s,color .12s,border-color .12s,opacity .12s;}
  .btn-mini:hover{background:var(--hover);color:var(--text);}
  .btn-mini.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-mini.primary:hover{background:var(--accent-ink);}
  .btn-mini[disabled]{opacity:.5;cursor:not-allowed;}
  .btn-mini[disabled]:hover{background:var(--bg-elev);color:var(--muted);}
  .fm-edit{min-height:150px;}
  /* notes section */
  .notes-section{border-top:1px solid var(--hair-2);margin-top:6px;padding-top:2px;}
  .notes-view{font-size:12.5px;line-height:1.55;color:#23262d;white-space:pre-wrap;word-break:break-word;}
  .notes-empty{color:var(--faint);font-style:italic;}
  .notes-edit{min-height:96px;font-family:var(--sans);font-size:12.5px;line-height:1.55;}

  /* ---------- citation preview popup ---------- */
  .previewscrim{position:absolute;inset:0;z-index:30;background:rgba(13,13,13,0.30);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .previewscrim.open{opacity:1;pointer-events:auto;}
  .preview{position:absolute;z-index:31;top:50%;left:50%;transform:translate(-50%,-47%) scale(.985);opacity:0;pointer-events:none;
    width:min(560px,calc(100% - 40px));max-height:min(76%,660px);background:var(--bg-elev);border:1px solid var(--hair);border-radius:var(--r-lg);
    box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s ease,transform .2s cubic-bezier(.2,.8,.2,1);}
  .preview.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .pv-head{padding:15px 16px 13px;border-bottom:1px solid var(--hair);position:relative;display:flex;align-items:center;gap:9px;}
  .pv-eyebrow{font-size:10.5px;font-weight:650;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);}
  .pv-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:650;color:#fff;padding:3px 9px;border-radius:var(--r-xs);}
  .pv-title{font-size:15px;font-weight:660;letter-spacing:-0.012em;}
  .pv-close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--faint);
    cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;}
  .pv-close:hover{background:var(--hover);color:var(--text);}
  .pv-body{overflow-y:auto;padding:14px 16px 18px;}
  .pv-note{margin-top:12px;font-size:11.5px;color:var(--faint);border-top:1px solid var(--hair-2);padding-top:10px;}
  .pv-missing{font-size:12.5px;color:var(--muted);}
  /* original-paper (raw source) block inside the citation popup */
  .pv-raw{margin-top:14px;border-top:1px solid var(--hair);padding-top:12px;}
  .pv-rawhead{font-size:10.5px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
  .pv-rawhead code{font-family:var(--mono);font-size:10px;text-transform:none;letter-spacing:0;background:var(--bg-sunken);padding:1px 5px;border-radius:4px;}

  /* ---------- zoom controls ---------- */
  .zoomctl{position:absolute;right:16px;bottom:16px;z-index:6;display:flex;flex-direction:column;border:1px solid var(--hair);
    border-radius:var(--r-md);overflow:hidden;background:var(--bg-elev);box-shadow:var(--shadow-sm);}
  .zoomctl button{width:36px;height:36px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;
    border-bottom:1px solid var(--hair);font-family:var(--sans);transition:background .12s,color .12s;}
  .zoomctl button:last-child{border-bottom:none;font-size:13px;} .zoomctl button:hover{background:var(--hover);color:var(--text);}

  /* ---------- hover tooltip ---------- */
  .tip{position:absolute;z-index:9;pointer-events:none;background:var(--text);color:#fff;font-size:11px;padding:5px 9px;border-radius:var(--r-sm);
    display:none;white-space:nowrap;box-shadow:var(--shadow-md);} .tip .tp{font-family:var(--mono);opacity:.78;font-size:10px;}

  /* ---------- change-log drawer ---------- */
  .logscrim{position:absolute;inset:0;z-index:11;background:rgba(13,13,13,0.22);opacity:0;pointer-events:none;transition:opacity .25s ease;}
  .logscrim.open{opacity:1;pointer-events:auto;}
  .logdrawer{position:absolute;top:0;right:0;bottom:0;width:392px;max-width:90%;z-index:12;background:var(--bg-elev);
    border-left:1px solid var(--hair);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;}
  .logdrawer.open{transform:translateX(0);}
  .logdrawer .lh{display:flex;align-items:center;gap:8px;padding:15px 16px 13px;border-bottom:1px solid var(--hair);}
  .logdrawer .lh h3{margin:0;font-size:14.5px;font-weight:660;}
  .logdrawer .lh .meta{font-size:11.5px;color:var(--faint);margin-left:auto;font-variant-numeric:tabular-nums;}
  .logdrawer .lclose{width:28px;height:28px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--faint);cursor:pointer;font-size:17px;}
  .logdrawer .lclose:hover{background:var(--hover);color:var(--text);}
  .logdrawer .lbody{overflow-y:auto;padding:6px 16px 18px;}
  .logdrawer .md h2{font-size:12.5px;letter-spacing:.01em;color:var(--text);margin:15px 0 5px;font-variant-numeric:tabular-nums;}
  .logdrawer .empty{color:var(--faint);font-size:12.5px;padding:14px 0;}

  /* ---------- integrated terminal (light, VSCode-style, resizable) ---------- */
  .termpanel{position:absolute;left:0;right:0;bottom:0;height:300px;z-index:20;display:none;flex-direction:column;
    background:var(--bg);border-top:1px solid var(--hair);box-shadow:0 -10px 30px rgba(13,13,13,0.08);}
  .termpanel.open{display:flex;}
  .term-resize{position:absolute;top:-3px;left:0;right:0;height:7px;cursor:ns-resize;z-index:21;}
  .term-resize::after{content:"";position:absolute;left:50%;top:2px;transform:translateX(-50%);width:34px;height:3px;border-radius:3px;background:var(--hair);transition:background .12s;}
  .term-resize:hover::after{background:var(--accent);}
  .term-head{display:flex;align-items:center;gap:4px;height:35px;flex:0 0 35px;padding:0 8px 0 8px;border-bottom:1px solid var(--hair-2);background:var(--bg-sidebar);}
  .term-tabs{display:flex;align-items:center;gap:3px;min-width:0;overflow-x:auto;flex:1;scrollbar-width:none;}
  .term-tabs::-webkit-scrollbar{display:none;}
  .term-tab{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 4px 0 9px;border-radius:var(--r-sm);
    border:1px solid transparent;background:transparent;color:var(--muted);font-size:11.5px;font-weight:500;cursor:pointer;
    white-space:nowrap;font-family:var(--sans);transition:background .12s,color .12s,border-color .12s;}
  .term-tab:hover{background:var(--hover);color:var(--text);}
  .term-tab.active{background:var(--bg-elev);border-color:var(--hair);color:var(--text);box-shadow:var(--shadow-sm);}
  .term-tab-x{width:15px;height:15px;border:none;border-radius:4px;background:transparent;color:var(--faint);cursor:pointer;
    font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;flex:0 0 15px;}
  .term-tab-x:hover{background:var(--hair-2);color:var(--text);}
  .term-add{width:24px;height:24px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--faint);cursor:pointer;
    font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 24px;}
  .term-add:hover{background:var(--hover);color:var(--text);}
  .term-actions{display:flex;align-items:center;gap:2px;flex:0 0 auto;}
  .term-ico{width:26px;height:26px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--faint);cursor:pointer;
    font-size:15px;display:flex;align-items:center;justify-content:center;}
  .term-ico:hover{background:var(--hover);color:var(--text);}
  .term-hosts{flex:1;min-height:0;position:relative;background:var(--bg);}
  .term-host{position:absolute;inset:0;padding:7px 4px 7px 10px;background:var(--bg);overflow:hidden;}
  .term-host .xterm{height:100%;padding:0;}
  .term-host .xterm-viewport{background:transparent!important;}
  .term-host .xterm-viewport::-webkit-scrollbar{width:9px;} .term-host .xterm-viewport::-webkit-scrollbar-thumb{background:var(--hair);border-radius:6px;}

  /* ---------- responsive ---------- */
  @media (max-width:1024px){ .tb-search{width:200px;} }
  @media (max-width:860px){
    :root{--sb-w:208px;}
    .detail{top:auto;right:8px;left:8px;bottom:8px;width:auto;max-height:62%;}
    .logdrawer{width:100%;max-width:100%;}
    .tb-search{width:150px;} .tb-sub{display:none;}
  }
  @media (max-width:640px){
    /* sidebar folds to an icon rail (mirrors the collapsed treatment) */
    .sidebar{width:58px !important;flex-basis:58px !important;}
    .sb-name,.sb-label,.kb-meta,.kb-name,.kb-when,.sb-foot,.collapse{opacity:0;pointer-events:none;}
    .kb-mono{display:flex;} .kb-text{display:none;} .kb{justify-content:center;padding:7px 0;}
    .legend{display:none;}
    .detail{max-height:70%;}
    .preview{width:calc(100% - 24px);}
    /* keep the graph title legible: let it grow, drop the pill/spacer */
    /* (!important beats the inline display JS sets on the pill) */
    .lint-pill{display:none !important;}
    .tb-spacer{display:none;}
    .tb-title{flex:1 1 auto;max-width:none;min-width:0;}
    .tb-search{flex:0 1 150px;width:150px;min-width:92px;}
    .tb-btn{padding:0 9px;}
  }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar" data-tauri-drag-region>
      <span class="tb-title" id="tbTitle">—</span>
      <span class="lint-pill" id="lintPill" style="display:none" title="Show issues" tabindex="0"></span>
      <div class="lint-pop" id="lintPop"></div>
      <span class="tb-spacer"></span>
      <div class="tb-search"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/></svg><input id="searchInput" placeholder="Search nodes, types…" autocomplete="off" /><span class="tb-kbd">⌘K</span></div>
      <button class="tb-btn" id="termBtn" title="Terminal"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.2 4.5l3 3-3 3"/><line x1="8.4" y1="11" x2="13" y2="11"/></svg> Terminal</button>
      <button class="tb-btn" id="logBtn" title="Change log"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.2"/><path d="M8 4.4V8l2.6 1.6"/></svg> Log</button>
      <span class="tb-sub" id="tbSub">— nodes · — edges</span>
    </div>
    <div class="wbody" id="wbody">
      <aside class="sidebar">
        <div class="sb-top"><span class="sb-name">BioOKF Studio</span><button class="collapse" id="collapseBtn" title="Collapse">‹</button></div>
        <div class="sb-label">Knowledge bases</div>
        <div class="kb-list" id="kbList"></div>
        <div class="sb-foot"><button class="new-kb">＋  New base</button></div>
      </aside>
      <main class="main">
        <div class="stage"><canvas id="graph"></canvas></div>
        <div class="legend" id="legend"><h4>Node types <span class="tg" id="legendToggle">hide</span></h4><div class="legend-body" id="legendBody"></div></div>
        <div class="detail" id="detail"></div>
        <div class="zoomctl"><button id="zoomIn" title="Zoom in">+</button><button id="zoomOut" title="Zoom out">−</button><button id="zoomFit" title="Fit to view">⤢</button></div>
        <div class="tip" id="tip"></div>
        <div class="previewscrim" id="previewScrim"></div>
        <aside class="preview" id="preview"></aside>
        <div class="logscrim" id="logScrim"></div>
        <aside class="logdrawer" id="logDrawer">
          <div class="lh"><h3>Change log</h3><span class="meta" id="logMeta"></span><button class="lclose" id="logClose">×</button></div>
          <div class="lbody"><div class="md" id="logBody"></div></div>
        </aside>
        <aside class="termpanel" id="termPanel">
          <div class="term-resize" id="termResize"></div>
          <div class="term-head">
            <div class="term-tabs" id="termTabs"></div>
            <button class="term-add" id="termAddTab" title="New terminal">+</button>
            <span class="term-actions"><button class="term-ico" id="termClose" title="Close all terminals">×</button></span>
          </div>
          <div class="term-hosts" id="termHosts"></div>
        </aside>
      </main>
    </div>
  </div>

<script>document.documentElement.classList.toggle('tauri', !!(window.__TAURI__ || window.__TAURI_INTERNALS__));</script>
<script src="vendor/xterm.js"></script>
<script src="vendor/xterm-addon-fit.js"></script>
<script src="app.js?v=10"></script>
</body>
</html>
